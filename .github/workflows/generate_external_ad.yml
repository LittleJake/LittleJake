name: Generate External AD

on: 
  workflow_dispatch:
    inputs:
      rule_url:
        description: '规则地址 [可选]'
        default: 'https://cdn.jsdelivr.net/gh/banbendalao/ADgk@master/ADgk.txt'
      merge:
        description: '真：文件合并去重，假：覆盖文件 [可选]'
        type: boolean
        required: false
        default: true
   
jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
    - name: Checkout
      uses: actions/checkout@master
      with:
        ref: rm
    - name: Run Merge
      if: github.event.inputs.merge
      run: | 
        echo ";规则地址：${{ github.event.inputs.rule_url }}" >> mobile_ad.list
        curl ${{ github.event.inputs.rule_url }}|grep "^||[a-zA-Z0-9\.]*^$"|sed 's/||//'|sed 's/\^//'|awk '{print "DOMAIN,"$1}' >> mobile_ad.list
        cat mobile_ad.list|sort|uniq > mobile_ad.list
    - name: Run Override
      if: github.event.inputs.merge == 'false'
      run: | 
        echo ";规则地址：${{ github.event.inputs.rule_url }}" >> mobile_ad.list
        curl ${{ github.event.inputs.rule_url }}|grep "^||[a-zA-Z0-9\.]*^$"|sed 's/||//'|sed 's/\^//'|awk '{print "DOMAIN,"$1}' > mobile_ad.list
    - name: Commit
      run: |
        git config --global user.email action@github.com
        git config --global user.name GitHub Action
        git add .
        git commit -m "Action: update AD Rule" -a
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: rm
